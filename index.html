<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Mario-Like</title>
<style>
  body {
    margin: 0;
    background: #87CEEB;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    border: 3px solid #000;
    background: #87CEEB;
  }
</style>
</head>
<body>
<canvas id="game" width="960" height="540"></canvas>

<script>
// ----------------------
// IMAGE LOADING
// ----------------------
const imgGround = new Image(); imgGround.src = "GND.png";
const imgPipe   = new Image(); imgPipe.src = "OBJ1.png";
const imgBrick  = new Image(); imgBrick.src = "OBJB.png"; // NEW
const imgPlayer = new Image(); imgPlayer.src = "CHAR.png";
const imgEnemy  = new Image(); imgEnemy.src = "ENMY.png";

// ----------------------
// INPUT
// ----------------------
const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup",   e => keys[e.key.toLowerCase()] = false);

// ----------------------
// CONSTANTS
// ----------------------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRAVITY = 0.6;
const FRICTION = 0.8;

// ----------------------
// WORLD DATA
// ----------------------
const world = {
  scrollX: 0,
  chunks: [],
  pipes: [],
  bricks: [],   // NEW
  enemies: [],
  lastChunkEnd: 0,
  chunkWidth: 400
};

// ----------------------
// PLAYER
// ----------------------
const player = {
  x: 100,
  y: 0,
  w: 32,
  h: 48,
  vx: 0,
  vy: 0,
  speed: 3,
  fastSpeed: 5,
  onGround: false
};

// ----------------------
// HITBOX UTILITY
// ----------------------
function hitbox(obj) {
  return {
    x: obj.x - 1,
    y: obj.y - 1,
    w: obj.w + 2,
    h: obj.h + 2
  };
}

function rectsCollide(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// ----------------------
// CHUNK GENERATION
// ----------------------
function createChunk(startX) {
  const groundHeight = 80;

  // Ground
  world.chunks.push({
    x: startX,
    y: canvas.height - groundHeight,
    w: world.chunkWidth,
    h: groundHeight
  });

  // Pipe
  if (Math.random() < 0.3) {
    world.pipes.push({
      x: startX + 100 + Math.random() * 200,
      y: canvas.height - groundHeight - 60,
      w: 60,
      h: 60
    });
  }

  // Breakable brick
  if (Math.random() < 0.5) {
    world.bricks.push({
      x: startX + 80 + Math.random() * 250,
      y: canvas.height - groundHeight - 150,
      w: 40,
      h: 40,
      broken: false
    });
  }

  // Enemy
  if (Math.random() < 0.4) {
    const ex = startX + 100 + Math.random() * 200;
    world.enemies.push({
      x: ex,
      y: canvas.height - groundHeight - 32,
      w: 32,
      h: 32,
      vx: (Math.random() < 0.5 ? -1 : 1) * 1,
      range: 50,
      baseX: ex,
      dead: false
    });
  }

  world.lastChunkEnd = startX + world.chunkWidth;
}

// Preload chunks
for (let i = 0; i < 5; i++) {
  createChunk(i * world.chunkWidth);
}

// ----------------------
// PLAYER UPDATE
// ----------------------
function updatePlayer() {
  let moveRight = keys["w"] || keys["arrowright"];
  let moveLeft  = keys["s"] || keys["arrowleft"];
  let fast      = keys["shift"];

  const targetSpeed = fast ? player.fastSpeed : player.speed;

  if (moveRight) player.vx = targetSpeed;
  else if (moveLeft) player.vx = -targetSpeed;
  else player.vx *= FRICTION;

  if ((keys[" "] || keys["space"]) && player.onGround) {
    player.vy = -12;
    player.onGround = false;
  }

  player.vy += GRAVITY;

  player.x += player.vx;
  player.y += player.vy;

  // Camera follow
  const centerX = canvas.width / 2;
  if (player.x - world.scrollX > centerX) {
    world.scrollX = player.x - centerX;
  }

  // Generate new chunks
  while (world.lastChunkEnd < world.scrollX + canvas.width + world.chunkWidth) {
    createChunk(world.lastChunkEnd);
  }

  // Collision
  player.onGround = false;
  const pHit = hitbox(player);

  const solids = [...world.chunks, ...world.pipes];

  // Ground + pipes
  for (const s of solids) {
    const sHit = hitbox(s);

    if (rectsCollide(pHit, sHit)) {
      if (player.vy > 0 && player.y + player.h <= s.y + player.vy + 5) {
        player.y = s.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Breakable bricks
  for (const b of world.bricks) {
    if (b.broken) continue;

    const bHit = hitbox(b);

    if (rectsCollide(pHit, bHit)) {
      // Hit from below
      if (player.vy < 0 && player.y >= b.y + b.h - 10) {
        b.broken = true;
        player.vy = 2; // slight bounce down
      }
      // Land on top
      else if (player.vy > 0 && player.y + player.h <= b.y + player.vy + 5) {
        player.y = b.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Death reset
  if (player.y > canvas.height + 200) {
    player.x = world.scrollX + 100;
    player.y = 0;
    player.vx = 0;
    player.vy = 0;
  }
}

// ----------------------
// ENEMY UPDATE
// ----------------------
function updateEnemies() {
  for (const e of world.enemies) {
    if (e.dead) continue;

    e.x += e.vx;
    if (Math.abs(e.x - e.baseX) > e.range) {
      e.vx *= -1;
    }

    const eHit = hitbox(e);
    const pHit = hitbox(player);

    // Stomp hitbox
    const stomp = {
      x: e.x,
      y: e.y - 8,
      w: e.w,
      h: 8
    };

    // Player stomps enemy
    if (rectsCollide(pHit, stomp) && player.vy > 0) {
      e.dead = true;
      player.vy = -10;
      continue;
    }

    // Enemy kills player
    if (rectsCollide(pHit, eHit)) {
      player.x = world.scrollX + 100;
      player.y = 0;
      player.vx = 0;
      player.vy = 0;
    }
  }
}

// ----------------------
// DRAW
// ----------------------
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const offsetX = world.scrollX;

  // Ground
  for (const g of world.chunks) {
    ctx.drawImage(imgGround, g.x - offsetX, g.y, g.w, g.h);
  }

  // Pipes
  for (const p of world.pipes) {
    ctx.drawImage(imgPipe, p.x - offsetX, p.y, p.w, p.h);
  }

  // Bricks
  for (const b of world.bricks) {
    if (!b.broken) {
      ctx.drawImage(imgBrick, b.x - offsetX, b.y, b.w, b.h);
    }
  }

  // Enemies
  for (const e of world.enemies) {
    if (!e.dead) {
      ctx.drawImage(imgEnemy, e.x - offsetX, e.y, e.w, e.h);
    }
  }

  // Player
  ctx.drawImage(imgPlayer, player.x - offsetX, player.y, player.w, player.h);
}

// ----------------------
// GAME LOOP
// ----------------------
function loop() {
  updatePlayer();
  updateEnemies();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
